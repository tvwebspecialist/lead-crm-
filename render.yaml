services:
  - type: web
    name: lead-crm
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python3 server.py --host 0.0.0.0 --port $PORT"
    envVars:
      - key: CRM_DATA_DIR
        value: /data
      - key: CRM_COOKIE_SECURE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.9"
    disk:
      name: crm-data
      mountPath: /data
      sizeGB: 1

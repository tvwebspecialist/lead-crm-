app = "lead-crm-tommaso"
primary_region = "fra"

[build]

[env]
  CRM_DATA_DIR = "/data"
  CRM_COOKIE_SECURE = "true"

[[mounts]]
  source = "crm_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
